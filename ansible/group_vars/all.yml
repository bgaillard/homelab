---
# Server store their backups into the /src/backups/ directory which mounts a Samba share.
#
# The Samba share is then backed up to an off-site location using Restic.
backups_smb_server: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=kv/data/servers/smb:ip_address') }}"
backups_smb_share: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=kv/data/servers/smb:share') }}"
backups_smb_username: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=kv/data/servers/smb:username') }}"
backups_smb_password: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=kv/data/servers/smb:password') }}"
backups_smb_version: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=kv/data/servers/smb:version') }}"

default_certs:
  - file_name: "homelab.internal.crt"
    content: "{{ lookup('community.general.bitwarden', '8fa44d76-0ecc-491f-a33a-b4060154471a', search='id', field='tlsCertificate') | first | replace('-----BEGIN CERTIFICATE-----', '__BC__') | replace('-----END CERTIFICATE-----', '__EC__') | replace(' ', '\n') | replace('__BC__', '-----BEGIN CERTIFICATE-----') | replace('__EC__', '-----END CERTIFICATE-----') }}"


# All servers use a Postfix server to easily send emails with the 'mail', 'mailx' or 'sendmail' command line utilities.
smtp:
  host: "{{ lookup('community.general.bitwarden', '9c839a59-a7e4-4be9-88c7-b40500b6248c', search='id', field='smtpHost') | first }}"
  port: "{{ lookup('community.general.bitwarden', '9c839a59-a7e4-4be9-88c7-b40500b6248c', search='id', field='smtpPort') | first }}"
  username: "{{ lookup('community.general.bitwarden', '9c839a59-a7e4-4be9-88c7-b40500b6248c', search='id', field='smtpUsername') | first }}"
  password: "{{ lookup('community.general.bitwarden', '9c839a59-a7e4-4be9-88c7-b40500b6248c', search='id', field='smtpPassword') | first }}"
