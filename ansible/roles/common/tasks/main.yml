---
# @see https://serverfault.com/questions/1044921/merging-variables-in-ansible-with-roles#answer-1044925
- name: Merge 'network' properties with defaults
  set_fact:
    network: >
      {{
        {
          'nameservers': [
            '8.8.8.8',
            '8.8.4.4'
          ],
          'ethernet': {
            'enabled': true,
            'mac_address': '00:00:00:00:00:00',
            'dhcp': true,
            'static': {
              'ip_address': '0.0.0.0',
              'netmask': '255.255.255.0',
              'gateway': '192.168.1.1'
            }
          },
          'wifi': {
            'enabled': false,
            'mac_address': '00:00:00:00:00:00',
            'dhcp': true,
            'static': {
              'ip_address': '0.0.0.0',
              'netmask': '255.255.255.0',
              'gateway': '192.168.1.1'
            },
            'wpa_ssid': '',
            'wpa_psk': ''
          }
        } | combine(network, recursive=True)
      }}
- import_tasks: 01-host.yml
- import_tasks: 01-journald.yml
- import_tasks: 02-packages.yml
- import_tasks: 03-disable-services.yml
- import_tasks: 04-disable-bluetooth.yml
- import_tasks: 05-disable-wifi.yml
- import_tasks: 06-network.yml
- import_tasks: 07-mount-srv-backups.yml
- import_tasks: 08-update-ca-certificates.yml
- import_tasks: 09-postfix.yml
