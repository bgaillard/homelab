---
# @see https://docs.gitlab.com/install/package/debian/
- name: Check the Gitlab CE keyring file
  ansible.builtin.stat:
    path: /usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.gpg
  register: gitlab_keyring_file

- name: Add Gitlab CE keyring directory
  ansible.builtin.shell:
    cmd: wget -O - https://packages.gitlab.com/gitlab/gitlab-ce/gpgkey | gpg --dearmor --yes -o /usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.gpg
  become: true
  when: not gitlab_keyring_file.stat.exists

- name: Add Gitlab CE APT repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch=arm64 signed-by=/usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.gpg] https://packages.gitlab.com/gitlab/gitlab-ce/debian/ trixie main"
    state: present
    filename: gitlab_gitlab-ce
    update_cache: no

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: yes

- name: Install 'gitlab-ce' Linux package
  become: true
  ansible.builtin.package:
    name:
      - gitlab-ce
    state: latest

# @see https://docs.gitlab.com/omnibus/settings/configuration/#configure-the-external-url-for-gitlab
- name: Configure the 'external_url' property in '/etc/gitlab/gitlab.rb'
  become: true
  ansible.builtin.replace:
    path: /etc/gitlab/gitlab.rb
    regexp: '^external_url\s+(.*)$'
    replace: "external_url '{{ gitlab_external_url }}'"

# @see https://docs.gitlab.com/omnibus/settings/memory_constrained_envs/#optimize-puma
- name: Configure the "puma['worker_processes']" property in '/etc/gitlab/gitlab.rb'
  become: true
  ansible.builtin.replace:
    path: /etc/gitlab/gitlab.rb
    regexp: '^.*puma\[.{1}worker_processes.{1}\]\s*=\s*(.*)$'
    replace: "puma['worker_processes'] = 0"

# @see https://docs.gitlab.com/omnibus/settings/memory_constrained_envs/#optimize-sidekiq
- name: Configure the "sidekiq['concurrency']" property in '/etc/gitlab/gitlab.rb'
  become: true
  ansible.builtin.replace:
    path: /etc/gitlab/gitlab.rb
    regexp: '^.*sidekiq\[.{1}concurrency.{1}\]\s*=\s*(.*)$'
    replace: "sidekiq['concurrency'] = 10"

- name: Disable several properties in '/etc/gitlab/gitlab.rb'
  become: true
  ansible.builtin.replace:
    path: /etc/gitlab/gitlab.rb
    regexp: '^#\s+{{ property_name }}\[.{1}enable.{1}\] = (.*)$'
    replace: "{{ property_name }}['enable'] = false"
  loop:
    # Disable Let's Encrypt because we use a manually configured self-signed TLS certificate
    #
    # @see https://docs.gitlab.com/omnibus/settings/ssl/#configure-https-manually
    - letsencrypt

    # Disable the monitoring stack because we are a Raspberry Pi 4 with low resources and we'll setup a centralized
    # monitoring stack elsewhere
    #
    # @see https://docs.gitlab.com/omnibus/settings/rpi/#install-gitlab-via-the-official-repository
    # @see https://docs.gitlab.com/omnibus/settings/memory_constrained_envs/#disable-monitoring
    - alertmanager
    - gitlab_exporter
    - gitlab_kas
    - node_exporter
    - postgres_exporter
    - prometheus_monitoring
    - prometheus
    - redis_exporter
  loop_control:
    loop_var: property_name

- name: Disable "puma['exporter_enabled']" property in '/etc/gitlab/gitlab.rb'
  become: true
  ansible.builtin.replace:
    path: /etc/gitlab/gitlab.rb
    regexp: '^.*puma\[.{1}exporter_enabled.{1}\]\s*=\s*(.*)$'
    replace: "puma['exporter_enabled'] = false"

- name: Disable "sidekiq['metrics_enabled']" property in '/etc/gitlab/gitlab.rb'
  become: true
  ansible.builtin.replace:
    path: /etc/gitlab/gitlab.rb
    regexp: '^.*sidekiq\[.{1}metrics_enabled.{1}\]\s*=\s*(.*)$'
    replace: "sidekiq['metrics_enabled'] = false"

- name: Create the '/etc/gitlab/ssl' directory
  become: true
  ansible.builtin.file:
    path: /etc/gitlab/ssl
    state: directory
    mode: '0755'

- name: Copy Gitlab TLS certificate
  become: true
  ansible.builtin.copy:
    content: "{{ gitlab_tls_cert }}"
    dest: /etc/gitlab/ssl/gitlab.crt
    mode: '0644'

- name: Copy Gitlab TLS private key
  become: true
  ansible.builtin.copy:
    content: "{{ gitlab_tls_key }}"
    dest: /etc/gitlab/ssl/gitlab.key
    mode: '0600'

- name: Reconfigure Gitlab
  become: true
  ansible.builtin.command:
    cmd: gitlab-ctl reconfigure
